services:

  # ─────────────────────────────────────────────
  # ChromaDB — Serveur vectoriel HTTP
  # ─────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.3
    container_name: chromadb
    restart: unless-stopped
    ports:
      - "8100:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 15s
    networks:
      - chroma_net

  # ─────────────────────────────────────────────
  # Ollama — Embeddings locaux (nomic-embed-text)
  # ─────────────────────────────────────────────
  #ollama:
  #  image: ollama/ollama:latest
  #  container_name: ollama
  #  restart: unless-stopped
  #  ports:
  #    - "11434:11434"
  #  volumes:
  #    - ollama_data:/root/.ollama
  #  deploy:
  #    resources:
  #      reservations:
  #        devices:
  #          - driver: nvidia
  #            count: all
  #            capabilities: [gpu]
  #  healthcheck:
  #    test: ["CMD", "curl", "-f", "http://localhost:11434/"]
  #    interval: 30s
  #    timeout: 10s
  #    retries: 5
  #    start_period: 30s
  #  networks:
  #    - chroma_net

  # ─────────────────────────────────────────────
  # Streamlit Manager — Interface de gestion
  # GPU exposé pour PaddleOCR
  # ─────────────────────────────────────────────
  chroma-manager:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: chroma-manager
    restart: unless-stopped
    ports:
      - "8600:8501"
    environment:
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      - OLLAMA_HOST=http://10.75.12.5:11434
      - STREAMLIT_BROWSER_SERVER_ADDRESS=10.75.12.5
      - STREAMLIT_BROWSER_SERVER_PORT=8600
      # PaddleOCR : forcer CUDA device 0
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      chromadb:
        condition: service_healthy
      #ollama:
      #  condition: service_started
    networks:
      - chroma_net

volumes:
  chroma_data:
    driver: local
  #ollama_data:
  #  driver: local

networks:
  chroma_net:
    name: chroma_net
    # Pour connecter d'autres docker-compose à ChromaDB :
